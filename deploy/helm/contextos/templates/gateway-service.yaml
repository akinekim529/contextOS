apiVersion: v1
kind: Service
metadata:
  name: {{ include "contextos.name" . }}-gateway
  labels:
    {{- include "contextos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "contextos.name" . }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
{{- if .Values.gateway.pdb }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "contextos.name" . }}-gateway
  labels:
    {{- include "contextos.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "contextos.name" . }}
      app.kubernetes.io/component: gateway
{{- end }}
