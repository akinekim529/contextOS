syntax = "proto3";

package contextos.cache.v1;

// Two-tier semantic cache. Keys are tenant-salted; lookups are per-tenant only (no leaks).
message LookupRequest {
  string tenant_id = 1;
  string query = 2;
  string model_id = 3;
  string system_prompt_version = 4;
  string stable_fact_set_version = 5;
  bool memory_private_grounded = 6;   // true => non-cacheable (skip write), per C6
}

message LookupResponse {
  bool hit = 1;
  string tier = 2;                    // "exact" (<1ms) | "semantic" (8-15ms) | ""
  string response_ref = 3;
  string fingerprint = 4;             // coarse signature (C6)
}

service CacheService {
  rpc Lookup(LookupRequest) returns (LookupResponse);
}
